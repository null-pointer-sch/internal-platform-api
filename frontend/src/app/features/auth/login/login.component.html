<div class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    <p class="subtitle">Sign in to your envctl account</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" class="form-control"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="you@example.com" />
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
          Please enter a valid email address
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" class="form-control"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Enter your password" />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          Password is required
        </div>
      </div>

      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <!-- Dev Only verification link (mock_api mode) -->
      <div *ngIf="verificationUrl && emailMode === 'mock_api'" class="alert alert-info"
        style="background-color: #e2f3f5; color: #0c5460; padding: 12px; border-radius: 4px; border: 1px solid #bee5eb; margin-bottom: 16px;">
        <p style="margin: 0 0 8px 0; font-size: 0.9em;"><strong>Dev Mode:</strong> No real email was sent. Use this link
          to verify:</p>
        <a [href]="verificationUrl" class="btn btn-sm btn-outline-info"
          style="display: inline-block; text-decoration: none; border: 1px solid #17a2b8; color: #17a2b8; padding: 4px 12px; border-radius: 4px; font-size: 0.85em;">
          Verify Now
        </a>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

      <div *ngIf="isDevelopment" class="dev-actions">
        <button type="button" class="btn btn-secondary dev-btn" (click)="loginAsAdmin()" [disabled]="loading">
          Dev: Login as Admin
        </button>
      </div>

    </form>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>

# Parallelized Cloud-Native Pipeline
name: Pipeline

on:
  push:
    branches:
      - main
      - feature/fix-cloud-env

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: "internal-platform-api"
  REGION: "europe-west1"
  ARTIFACT_REPO_ID: "internal-platform-api"
  GCP_WIF_PROVIDER: "projects/1062901461072/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
  GCP_SERVICE_ACCOUNT: "github-actions-deploy@internal-platform-api.iam.gserviceaccount.com"

jobs:
  validate:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/fix-cloud-env')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "poetry"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Dependencies
        shell: bash
        run: |
          cd backend && poetry install &
          cd ../frontend && npm ci &
          wait

      - name: Linting
        shell: bash
        run: |
          cd backend && poetry run ruff check . &
          cd ../frontend && (npm run lint || echo "Frontend lint failed") &
          wait

      - name: Unit & Integration Tests
        shell: bash
        run: |
          cd backend && poetry run pytest --cov=app --cov-report=xml:../backend/coverage.xml &
          cd ../frontend && (npm test -- --no-watch --no-progress --browsers=ChromeHeadless --code-coverage || echo "Frontend tests skipped") &
          wait

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=null-pointer-sch_internal-platform-api
            -Dsonar.organization=null-pointer-sch
            -Dsonar.sources=backend/app,frontend/src/app
            -Dsonar.tests=backend/tests,frontend/src/app
            -Dsonar.test.inclusions=backend/tests/**,frontend/src/**/*.spec.ts
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/envctl-ui/lcov.info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  dockerize:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/fix-cloud-env')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Auth to GCP
        uses: null-pointer-sch/cicd-templates/actions/gcp-auth@main
        with:
          wif-provider: ${{ env.GCP_WIF_PROVIDER }}
          service-account: ${{ env.GCP_SERVICE_ACCOUNT }}
          region: ${{ env.REGION }}

      - name: Build Frontend Assets
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Docker Build & Push
        shell: bash
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_ID }}"
          
          docker build -f backend/Dockerfile -t "${IMAGE_BASE}/internal-platform-api-backend:${{ github.sha }}" backend &
          docker build -f frontend/Dockerfile -t "${IMAGE_BASE}/internal-platform-api-frontend:${{ github.sha }}" frontend &
          wait
          
          docker push "${IMAGE_BASE}/internal-platform-api-backend:${{ github.sha }}" &
          docker push "${IMAGE_BASE}/internal-platform-api-frontend:${{ github.sha }}" &
          wait

  deploy:
    needs: [validate, dockerize]
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.get_urls.outputs.backend_url }}
      frontend_url: ${{ steps.get_urls.outputs.frontend_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: null-pointer-sch/cicd-templates/actions/gcp-auth@main
        with:
          wif-provider: ${{ env.GCP_WIF_PROVIDER }}
          service-account: ${{ env.GCP_SERVICE_ACCOUNT }}
          region: ${{ env.REGION }}

      - name: Deploy Image
        id: deploy
        uses: null-pointer-sch/cicd-templates/actions/terraform-deploy@main
        with:
          project-id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          artifact-repo-id: ${{ env.ARTIFACT_REPO_ID }}
          image-tag: ${{ github.sha }}
          working-directory: "terraform"
          database-url: ${{ secrets.DATABASE_URL }}

      - name: Get Deployment URLs
        id: get_urls
        shell: bash
        run: |
          cd terraform
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

  smoke-backend:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke Test Backend
        env:
          BACKEND_URL: ${{ needs.deploy.outputs.backend_url }}
        run: |
          pip install httpx
          python scripts/smoke_backend.py

  smoke-frontend:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke Test Frontend
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.frontend_url }}
        run: |
          pip install httpx
          python scripts/smoke_frontend.py

  smoke-e2e:
    needs: [deploy, smoke-backend, smoke-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke Test E2E
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.frontend_url }}
        run: |
          pip install httpx
          python scripts/smoke_e2e.py
